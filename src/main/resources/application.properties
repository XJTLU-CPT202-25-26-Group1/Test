# ========================
# 基础配置
# ========================
spring.application.name=Specialist-Consultation-Booking-System
server.port=8080

# ========================
# 数据库配置
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/cpt202_booking?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8mb4
spring.datasource.username=root
spring.datasource.password=Group1@Cpt202
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.type=com.zaxxer.hikari.HikariDataSource

# Hikari连接池配置（提高性能）
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ========================
# JPA/Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ========================
# 静态资源（前端整合必备）
# ========================
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0  # 开发环境禁用缓存
spring.web.resources.chain.cache=false

# ========================
# Thymeleaf模板
# ========================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html
spring.thymeleaf.cache=false  # 开发环境禁用缓存

# ========================
# 文件上传
# ========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ========================
# 日志
# ========================
logging.level.root=INFO
logging.level.com.cpt202.booking=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
