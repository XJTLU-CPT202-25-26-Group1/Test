<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Expertise Categories', '/css/admin/categories.css')}"></head>
<body>
<div class="page-shell">
    <header th:replace="~{fragments/layout :: topbar}"></header>
    <section th:replace="~{fragments/layout :: flash}"></section>

    <div class="shell-body">
        <aside th:replace="~{fragments/layout :: sideNav}"></aside>
        <main class="page-content stack">
            <section class="page-header">
                <div>
                    <h1>Expertise categories</h1>
                    <p>Maintain the master data used across specialist registration, filtering, and profile administration.</p>
                </div>
            </section>

            <section class="two-column">
                <article class="panel">
                    <div class="section-header">
                        <div>
                            <h2>Create category</h2>
                            <p class="section-subtitle">New categories start as active by default.</p>
                        </div>
                    </div>
                    <form class="stack" th:action="@{/admin/categories}" method="post">
                        <th:block th:replace="~{fragments/layout :: csrf}"></th:block>
                        <div class="field">
                            <label for="name">Category name</label>
                            <input id="name" name="name" type="text" required placeholder="e.g. Legal">
                        </div>
                        <button class="button button--primary" type="submit">Create category</button>
                    </form>
                </article>

                <article class="table-card">
                    <div class="section-header">
                        <div>
                            <h2>Existing categories</h2>
                            <p class="section-subtitle">Rename categories or toggle their active state.</p>
                        </div>
                    </div>
                    <div class="stack" th:if="${!#lists.isEmpty(categories)}">
                        <article class="list-card" th:each="category : ${categories}">
                            <div class="section-header">
                                <div>
                                    <h3 th:text="${category.name}">Legal</h3>
                                    <span class="status-badge" th:classappend="' status-' + ${#strings.toLowerCase(category.status.name())}"
                                          th:text="${category.status}">ACTIVE</span>
                                </div>
                            </div>
                            <div class="split-actions">
                                <form class="inline-form" th:action="@{/admin/categories/update}" method="post">
                                    <th:block th:replace="~{fragments/layout :: csrf}"></th:block>
                                    <input type="hidden" name="id" th:value="${category.id}">
                                    <input name="name" type="text" th:value="${category.name}" required>
                                    <button class="button button--secondary" type="submit">Rename</button>
                                </form>
                                <form th:action="@{/admin/categories/toggle}" method="post">
                                    <th:block th:replace="~{fragments/layout :: csrf}"></th:block>
                                    <input type="hidden" name="id" th:value="${category.id}">
                                    <button class="button button--ghost" type="submit">Toggle status</button>
                                </form>
                            </div>
                        </article>
                    </div>
                    <div class="empty-state" th:if="${#lists.isEmpty(categories)}">
                        No categories available yet.
                    </div>
                </article>
            </section>
        </main>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</div>
<th:block th:replace="~{fragments/layout :: scripts('/js/admin/categories.js')}"></th:block>
</body>
</html>
