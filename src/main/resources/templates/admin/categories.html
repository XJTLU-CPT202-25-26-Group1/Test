<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Expertise Categories')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<div th:replace="~{fragments/layout :: alerts}"></div>
<main class="container py-5">
    <div class="page-wrap">
        <section class="page-intro">
            <div class="page-kicker">Administrator master data</div>
            <h1 class="page-title">Expertise Categories</h1>
            <p class="page-summary">Create, update, activate, and deactivate expertise categories used across specialist records and booking filters.</p>
        </section>

        <section class="section-panel mb-4">
            <div class="section-heading">
                <div>
                    <h2>Create category</h2>
                    <p class="section-note">Duplicate names are blocked by the backend rule.</p>
                </div>
            </div>
            <form class="row g-3" th:action="@{/admin/categories}" method="post">
                <div class="col-md-8"><label class="form-label">Category name</label><input class="form-control" type="text" name="name" placeholder="New category name" required></div>
                <div class="col-md-4 d-flex align-items-end"><button class="btn btn-primary w-100" type="submit">Add Category</button></div>
            </form>
        </section>

        <section class="section-panel">
            <div class="section-heading">
                <div>
                    <h2>Category list</h2>
                    <p class="section-note">Maintenance actions for existing categories.</p>
                </div>
            </div>
            <div class="compact-stack">
                <div class="record-card" th:each="category : ${categories}">
                    <div class="record-head">
                        <form th:action="@{/admin/categories/update}" method="post" class="inline-actions w-100">
                            <input type="hidden" name="id" th:value="${category.id}">
                            <input class="form-control form-control-sm" type="text" name="name" th:value="${category.name}" required>
                            <button class="btn btn-outline-primary btn-sm" type="submit">Update</button>
                        </form>
                        <span class="status-tag" th:text="${category.status}">ACTIVE</span>
                    </div>
                    <form th:action="@{/admin/categories/toggle}" method="post">
                        <input type="hidden" name="id" th:value="${category.id}">
                        <button class="btn btn-outline-dark btn-sm" type="submit" th:text="${category.status.name() == 'ACTIVE' ? 'Deactivate' : 'Activate'}">Toggle</button>
                    </form>
                </div>
            </div>
        </section>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
