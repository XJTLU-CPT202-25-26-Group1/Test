<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('编辑专家')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<div th:replace="~{fragments/layout :: alerts}"></div>
<main class="container py-5">
  <div class="page-wrap">
    <section class="panel-card">
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
        <div>
          <h1 class="section-title mb-1">编辑专家资料</h1>
          <p class="section-caption mb-0">更新专家姓名、价格、分类和简介信息。</p>
        </div>
        <a class="btn btn-outline-secondary" th:href="@{/admin/specialists}">返回专家列表</a>
      </div>
      <form th:action="@{/admin/specialists/update}" method="post" class="row g-3">
        <input type="hidden" name="id" th:value="${specialist.id}">
        <div class="col-md-6">
          <label class="form-label">姓名</label>
          <input class="form-control" type="text" name="name" th:value="${specialist.name}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">级别</label>
          <input class="form-control" type="text" name="level" th:value="${specialist.level}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">咨询费</label>
          <input class="form-control" type="number" step="0.01" name="feeRate" th:value="${specialist.feeRate}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">分类</label>
          <select class="form-select" name="categoryId" required>
            <option th:each="category : ${categories}"
                    th:value="${category.id}"
                    th:selected="${specialist.category != null and specialist.category.id == category.id}"
                    th:text="${category.name}">Category</option>
          </select>
        </div>
        <div class="col-12">
          <label class="form-label">专家简介</label>
          <textarea class="form-control" name="description" rows="4" th:text="${specialist.profileDescription}" required></textarea>
        </div>
        <div class="col-12 d-flex gap-2 flex-wrap">
          <button class="btn btn-primary" type="submit">保存修改</button>
          <a class="btn btn-outline-secondary" th:href="@{/admin/specialists}">取消</a>
        </div>
      </form>
    </section>
  </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
