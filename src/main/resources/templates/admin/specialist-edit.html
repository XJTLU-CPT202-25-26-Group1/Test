<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Edit Specialist', '/css/admin/specialists.css')}"></head>
<body>
<div class="page-shell">
    <header th:replace="~{fragments/layout :: topbar}"></header>
    <section th:replace="~{fragments/layout :: flash}"></section>

    <div class="shell-body">
        <aside th:replace="~{fragments/layout :: sideNav}"></aside>
        <main class="page-content stack">
            <section class="page-header">
                <div>
                    <h1 th:text="${'Edit specialist: ' + specialist.name}">Edit specialist</h1>
                    <p>Update the specialist profile while keeping category and duplicate-name validation aligned with the backend service.</p>
                </div>
            </section>

            <section class="panel">
                <form class="stack" th:action="@{/admin/specialists/update}" method="post">
                    <th:block th:replace="~{fragments/layout :: csrf}"></th:block>
                    <input type="hidden" name="id" th:value="${specialist.id}">
                    <div class="form-grid">
                        <div class="field">
                            <label for="name">Name</label>
                            <input id="name" name="name" type="text" th:value="${specialist.name}" required>
                        </div>
                        <div class="field">
                            <label for="level">Level</label>
                            <input id="level" name="level" type="text" th:value="${specialist.level}" required>
                        </div>
                        <div class="field">
                            <label for="feeRate">Fee rate per hour</label>
                            <input id="feeRate" name="feeRate" type="number" min="0" step="0.01" th:value="${specialist.feeRate}" required>
                        </div>
                        <div class="field">
                            <label for="categoryId">Category</label>
                            <select id="categoryId" name="categoryId" required>
                                <option th:each="category : ${categories}"
                                        th:value="${category.id}"
                                        th:selected="${specialist.category != null and specialist.category.id == category.id}"
                                        th:text="${category.name}">Legal</option>
                            </select>
                        </div>
                        <div class="field field--full">
                            <label for="description">Description</label>
                            <textarea id="description" name="description" required th:text="${specialist.profileDescription}">Description</textarea>
                        </div>
                    </div>
                    <div class="inline-actions">
                        <button class="button button--primary" type="submit">Save specialist changes</button>
                        <a class="button button--ghost" th:href="@{/admin/specialists}">Back to specialists</a>
                    </div>
                </form>
            </section>
        </main>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</div>
<th:block th:replace="~{fragments/layout :: scripts('/js/admin/specialists.js')}"></th:block>
</body>
</html>
