<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: appLayout(
        'Edit Academic Expert',
        ~{::content},
        ~{::pageStyles},
        ~{::pageScripts}
      )}">
<body>
<th:block th:fragment="pageStyles">
    <link rel="stylesheet" th:href="@{/css/admin.css(v='20260428')}">
</th:block>

<th:block th:fragment="content">
        <section class="admin-page">
            <div class="page-header admin-page__header">
                <div class="page-header__main">
                    <a class="page-back" th:href="@{/admin/specialists}">
                        <span class="page-back__icon" aria-hidden="true">&#8592;</span>
	                        <span>Back to Experts</span>
                    </a>
	                    <span class="section-kicker">Academic Expert Record</span>
	                    <h1 class="page-title">Edit Academic Expert</h1>
	                    <p class="page-subtitle">Update the expert profile used by search, appointment requests, and operations.</p>
                </div>
            </div>

        <section class="admin-edit-grid">
            <article class="card admin-summary-card admin-summary-card--profile">
                <span class="admin-summary-card__label">Current Record</span>
	                <strong th:text="${specialist.name}">Academic Expert Name</strong>
	                <p th:text="${specialist.category != null ? specialist.category.name : 'Uncategorized'}">Academic Area</p>
                <div class="admin-chip-row">
                    <span th:text="${specialist.level}">Level</span>
                    <span th:text="${'Fee ' + #numbers.formatDecimal(specialist.feeRate, 1, 2)}">Fee</span>
                    <span th:text="${specialist.status}">ACTIVE</span>
                </div>
            </article>

            <article class="card admin-form-card">
	                <h2>Update Academic Expert</h2>
                <form th:action="@{/admin/specialists/update}" method="post" class="admin-edit-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="id" th:value="${specialist.id}">

                    <div class="form-group">
                        <label for="name">Name</label>
                        <input id="name" name="name" type="text" maxlength="255" th:value="${specialist.name}" required>
                    </div>

                    <div class="form-group">
                        <label for="level">Level</label>
                        <input id="level" name="level" type="text" maxlength="255" th:value="${specialist.level}" required>
                    </div>

                    <div class="form-group">
                        <label for="feeRate">Fee Rate</label>
                        <input id="feeRate" name="feeRate" type="number" min="0.01" step="0.01"
                               th:value="${specialist.feeRate}" required>
                    </div>

                    <div class="form-group">
	                        <label for="categoryId">Academic Area</label>
                        <select id="categoryId" name="categoryId" required>
                            <option th:each="category : ${categories}"
                                    th:value="${category.id}"
                                    th:text="${category.name}"
                                    th:selected="${specialist.category != null and specialist.category.id == category.id}">
	                                Academic Area
                            </option>
                        </select>
                    </div>

                    <div class="form-group admin-edit-form__description">
                        <label for="description">Description</label>
                        <textarea id="description" name="description" maxlength="255" th:text="${specialist.profileDescription}" required></textarea>
                        <span class="help-text">Maximum 255 characters.</span>
                    </div>

                    <div class="admin-edit-form__actions">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <a class="btn btn-secondary" th:href="@{/admin/specialists}">Cancel</a>
                    </div>
                </form>
            </article>
        </section>
    </section>
</th:block>

<th:block th:fragment="pageScripts"></th:block>
</body>
</html>
