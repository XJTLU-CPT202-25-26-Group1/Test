<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('专家管理')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<div th:replace="~{fragments/layout :: alerts}"></div>
<main class="container py-5">
  <div class="page-wrap">
    <section class="page-intro">
      <div class="page-kicker">专家管理</div>
      <h1 class="page-title">专家资料维护</h1>
      <p class="page-summary">创建、搜索、编辑与启停专家记录，同时保持原有后端表单处理和列表逻辑。</p>
    </section>

    <section class="toolbar-panel mb-4">
      <form class="filter-grid" th:action="@{/admin/specialists}" method="get">
        <div>
          <label class="form-label">搜索专家</label>
          <input class="form-control" type="text" name="keyword" th:value="${keyword}" placeholder="按专家姓名或分类搜索">
        </div>
        <div>
          <label class="form-label">分类</label>
          <select class="form-select" name="categoryId">
            <option value="">全部分类</option>
            <option th:each="category : ${categories}"
                    th:value="${category.id}"
                    th:selected="${selectedCategoryId != null and selectedCategoryId == category.id}"
                    th:text="${category.name}">Category</option>
          </select>
        </div>
        <div>
          <label class="form-label">状态</label>
          <select class="form-select" name="status">
            <option value="">全部状态</option>
            <option th:each="statusOption : ${statuses}"
                    th:value="${statusOption.name()}"
                    th:selected="${selectedStatus == statusOption.name()}"
                    th:text="${statusOption.name()}">ACTIVE</option>
          </select>
        </div>
        <div>
          <button class="btn btn-outline-secondary w-100" type="submit">筛选</button>
        </div>
      </form>
    </section>

    <section class="section-panel mb-4">
      <div class="section-heading">
        <div>
          <h2>新增专家</h2>
          <p class="section-note">直接把专家资料写入系统主数据。</p>
        </div>
      </div>
      <form class="row g-3" th:action="@{/admin/specialists}" method="post">
        <div class="col-md-3"><label class="form-label">姓名</label><input class="form-control" type="text" name="name" placeholder="姓名" required></div>
        <div class="col-md-2"><label class="form-label">级别</label><input class="form-control" type="text" name="level" placeholder="级别" required></div>
        <div class="col-md-2"><label class="form-label">咨询费</label><input class="form-control" type="number" step="0.01" name="feeRate" placeholder="咨询费" required></div>
        <div class="col-md-3">
          <label class="form-label">分类</label>
          <select class="form-select" name="categoryId" required>
            <option value="">请选择分类</option>
            <option th:each="category : ${categories}" th:if="${category.status.name() == 'ACTIVE'}" th:value="${category.id}" th:text="${category.name}"></option>
          </select>
        </div>
        <div class="col-md-8"><label class="form-label">专家简介</label><input class="form-control" type="text" name="description" placeholder="填写专家简介" required></div>
        <div class="col-md-4 d-flex align-items-end"><button class="btn btn-primary w-100" type="submit">创建专家</button></div>
      </form>
    </section>

    <section class="section-panel table-panel">
      <div class="section-heading">
        <div>
          <h2>专家列表</h2>
          <p class="section-note">包含编辑和启停操作。</p>
        </div>
      </div>
      <div class="table-responsive">
        <table class="table table-striped plain-table">
          <thead><tr><th>姓名</th><th>分类</th><th>级别</th><th>咨询费</th><th>状态</th><th>操作</th></tr></thead>
          <tbody>
          <tr th:each="specialist : ${specialists}">
            <td th:text="${specialist.name}">Name</td>
            <td th:text="${specialist.category != null ? specialist.category.name : '未分类'}">Category</td>
            <td th:text="${specialist.level}">Level</td>
            <td th:text="${specialist.feeRate}">0</td>
            <td><span class="status-tag" th:text="${specialist.status}">ACTIVE</span></td>
            <td>
              <div class="compact-stack">
                <a class="btn btn-outline-primary btn-sm" th:href="@{/admin/specialists/edit(id=${specialist.id})}">编辑</a>
                <form th:action="@{/admin/specialists/toggle}" method="post">
                  <input type="hidden" name="id" th:value="${specialist.id}">
                  <button class="btn btn-outline-dark btn-sm w-100" type="submit" th:text="${specialist.status.name() == 'ACTIVE' ? '停用' : '启用'}">Toggle</button>
                </form>
              </div>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
