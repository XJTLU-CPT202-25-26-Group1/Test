<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Forgot Password', '/css/auth.css')}"></head>
<body>
<div class="page-shell">
    <header th:replace="~{fragments/layout :: topbar}"></header>
    <section th:replace="~{fragments/layout :: flash}"></section>

    <main class="auth-shell">
        <section class="hero-card auth-hero">
            <div>
                <div class="eyebrow">Password recovery</div>
                <h1>Request a reset token through your verified email address.</h1>
                <p>The reset flow is username-based and requires the same email address already stored on your account.</p>
            </div>
        </section>
        <section class="auth-card">
            <div class="section-header">
                <div>
                    <h2>Forgot password</h2>
                    <p class="section-subtitle">We will send reset instructions to your email.</p>
                </div>
            </div>
            <form class="stack" th:action="@{/auth/forgot-password}" method="post">
                <th:block th:replace="~{fragments/layout :: csrf}"></th:block>
                <div class="field">
                    <label for="username">Username</label>
                    <input id="username" name="username" type="text" required>
                </div>
                <div class="field">
                    <label for="email">Verified email</label>
                    <input id="email" name="email" type="email" required>
                </div>
                <button class="button button--primary" type="submit">Send reset instructions</button>
            </form>
            <div class="auth-links">
                <a th:href="@{/auth/login}">Back to login</a>
            </div>
        </section>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</div>
<th:block th:replace="~{fragments/layout :: scripts('/js/auth.js')}"></th:block>
</body>
</html>
