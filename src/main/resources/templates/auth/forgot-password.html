<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('找回密码')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<div th:replace="~{fragments/layout :: alerts}"></div>

<main class="site-main">
  <div class="page-wrap">
    <section class="auth-shell">
      <div class="auth-panel">
        <div class="page-kicker">密码找回</div>
        <h1>为已验证账户申请重置密码邮件。</h1>
        <p>请输入用户名和注册邮箱，系统会按原有逻辑发送密码重置说明。</p>
      </div>

      <div class="auth-card">
        <div class="page-kicker">重置申请</div>
        <h1>忘记密码？</h1>
        <p>我们会把重置说明发送到你的注册邮箱。</p>

        <form th:action="@{/auth/forgot-password}" method="post">
          <div>
            <label class="form-label">用户名</label>
            <input class="form-control" type="text" name="username" required>
          </div>
          <div>
            <label class="form-label">注册邮箱</label>
            <input class="form-control" type="email" name="email" required>
          </div>
          <div class="form-actions">
            <button class="btn btn-primary" type="submit">发送重置邮件</button>
            <a class="btn btn-outline-secondary" th:href="@{/auth/login}">返回登录</a>
          </div>
        </form>
      </div>
    </section>
  </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
