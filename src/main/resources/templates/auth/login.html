<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('登录')}"></head>
<body>
  <header th:replace="~{fragments/layout :: header}"></header>
  
  <main class="container my-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg border-0 rounded-4">
          <div class="card-header bg-primary text-white text-center py-4">
            <h3 class="mb-0 fw-bold">
              <i class="bi bi-person-circle me-2"></i>用户登录
            </h3>
          </div>
          
          <div class="card-body p-4">
            <!-- 消息提示区（由layout的alerts fragment处理） -->
            <div th:replace="~{fragments/layout :: alerts}"></div>
            
            <!-- 登录表单 -->
            <form th:action="@{/auth/login}" method="post" class="needs-validation" novalidate>
              <!-- CSRF Token -->
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              
              <div class="mb-4">
                <label for="username" class="form-label fw-bold">👤 用户名</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-person"></i></span>
                  <input type="text" 
                         class="form-control form-control-lg" 
                         id="username" 
                         name="username" 
                         required 
                         autofocus
                         th:value="${param.username}">
                  <div class="invalid-feedback">请输入用户名</div>
                </div>
              </div>
              
              <div class="mb-4">
                <label for="password" class="form-label fw-bold">🔒 密码</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-lock"></i></span>
                  <input type="password" 
                         class="form-control form-control-lg" 
                         id="password" 
                         name="password" 
                         required>
                  <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                    <i class="bi bi-eye"></i>
                  </button>
                  <div class="invalid-feedback">请输入密码</div>
                </div>
              </div>
              
              <div class="d-grid mb-3">
                <button type="submit" class="btn btn-primary btn-lg fw-bold py-3">
                  <i class="bi bi-box-arrow-in-right me-2"></i>立即登录
                </button>
              </div>
              
              <div class="text-center">
                <a th:href="@{/auth/register}" class="text-decoration-none fw-bold text-primary">
                  <i class="bi bi-person-plus me-1"></i>还没有账号？立即注册
                </a>
                <div class="mt-3 text-muted small">
                  <p class="mb-1">💡 测试账号（开发环境）：</p>
                  <p class="mb-0">管理员: admin / admin123</p>
                  <p class="mb-0">专家: specialist / specialist123</p>
                  <p class="mb-0">客户: customer / customer123</p>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer th:replace="~{fragments/layout :: footer}"></footer>
  
  <!-- 页面专属JS -->
  <script th:src="@{/js/auth.js}"></script>
</body>
</html>
