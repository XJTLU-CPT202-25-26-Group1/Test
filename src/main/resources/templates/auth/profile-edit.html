<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Edit Profile')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<div th:replace="~{fragments/layout :: alerts}"></div>

<main class="site-main">
  <div class="page-wrap">
    <section class="page-intro">
      <div class="page-kicker">Account settings</div>
      <h1 class="page-title">Edit profile</h1>
      <p class="page-summary">Keep your display name, email, and phone number up to date for booking communications and workflow notifications.</p>
    </section>

    <section class="auth-card" th:if="${profile != null}">
      <form th:action="@{/auth/profile-edit}" method="post">
        <div class="field-grid">
          <div>
            <label class="form-label">Display Name</label>
            <input class="form-control" type="text" name="displayName" th:value="${profile.displayName}" required>
          </div>
          <div>
            <label class="form-label">Email</label>
            <input class="form-control" type="email" name="email" th:value="${profile.email}" required>
          </div>
          <div>
            <label class="form-label">Phone</label>
            <input class="form-control" type="text" name="phone" th:value="${profile.phone}" required>
          </div>
        </div>

        <div class="form-actions mt-4">
          <button class="btn btn-primary" type="submit">Save Changes</button>
          <a class="btn btn-outline-secondary" th:href="${dashboardPath}">Back to Dashboard</a>
        </div>
      </form>
    </section>

    <div class="empty-state" th:if="${profile == null}">
      Please log in first to update your profile.
    </div>
  </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
