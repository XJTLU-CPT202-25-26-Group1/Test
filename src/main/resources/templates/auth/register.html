<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('注册')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<div th:replace="~{fragments/layout :: alerts}"></div>

<main class="site-main">
  <div class="page-wrap">
    <section class="auth-shell">
      <div class="auth-panel">
        <div class="page-kicker">创建账户</div>
        <h1>注册客户或专家账号，进入统一医疗服务平台。</h1>
        <p>客户可直接发起预约；专家注册时会同时创建专家资料，因此会额外填写分类、级别、收费与简介。</p>

        <div class="support-note">
          <strong>注册说明</strong>
          <ul class="helper-list mt-2">
            <li>管理员账号由系统内部维护，不在此处开放注册。</li>
            <li>客户和专家账号注册后需要先完成邮箱验证。</li>
            <li>只有选择专家角色时才需要填写专家专属字段。</li>
          </ul>
        </div>
      </div>

      <div class="auth-card">
        <div class="page-kicker">注册表单</div>
        <h1>填写账户信息</h1>
        <p>请完成基础资料与角色信息，系统会按角色跳转到对应工作台。</p>

        <form th:action="@{/auth/register}" method="post">
          <div class="field-grid">
            <div>
              <label class="form-label">用户名</label>
              <input class="form-control" type="text" name="username" required>
            </div>
            <div>
              <label class="form-label">密码</label>
              <input class="form-control" type="password" name="password" minlength="6" required>
            </div>
            <div>
              <label class="form-label">显示名称</label>
              <input class="form-control" type="text" name="displayName" required>
            </div>
            <div>
              <label class="form-label">联系电话</label>
              <input class="form-control" type="text" name="phone" required>
            </div>
            <div>
              <label class="form-label">邮箱</label>
              <input class="form-control" type="email" name="email" required>
            </div>
            <div>
              <label class="form-label">角色</label>
              <select class="form-select" name="role" id="roleSelect" required>
                <option th:each="role : ${roles}" th:value="${role.name()}" th:text="${role.name()}"></option>
              </select>
            </div>

            <div class="field-full support-note">
              当角色选择为 <strong>SPECIALIST</strong> 时，下方会展开专家资料字段，仍然沿用原有后端注册逻辑。
            </div>

            <div class="specialist-only">
              <label class="form-label">专业分类</label>
              <select class="form-select" name="categoryId" id="categorySelect">
                <option value="">请选择分类</option>
                <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
              </select>
            </div>
            <div class="specialist-only">
              <label class="form-label">级别</label>
              <input class="form-control" type="text" name="level" placeholder="例如 Associate / Senior / Consultant">
            </div>
            <div class="specialist-only">
              <label class="form-label">时薪</label>
              <input class="form-control" type="number" step="0.01" min="0" name="feeRate" placeholder="例如 200">
            </div>
            <div class="specialist-only field-full">
              <label class="form-label">专家简介</label>
              <textarea class="form-control" name="description" rows="4" placeholder="填写专业方向、经验和擅长内容"></textarea>
            </div>
          </div>

          <div class="form-actions mt-4">
            <button class="btn btn-primary" type="submit">创建账户</button>
            <a class="btn btn-outline-secondary" th:href="@{/auth/login}">返回登录</a>
          </div>
        </form>
      </div>
    </section>
  </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script defer th:src="@{/js/auth.js}"></script>
</body>
</html>
