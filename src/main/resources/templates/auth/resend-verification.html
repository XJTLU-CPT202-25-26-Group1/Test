<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Resend Verification', '/css/auth.css')}"></head>
<body>
<div class="page-shell">
    <header th:replace="~{fragments/layout :: topbar}"></header>
    <section th:replace="~{fragments/layout :: flash}"></section>

    <main class="auth-shell">
        <section class="hero-card auth-hero">
            <div>
                <div class="eyebrow">Email verification</div>
                <h1>Resend a verification link if you have not activated your account yet.</h1>
                <p>Verification is required before the login flow can unlock customer, specialist, or administrator features.</p>
            </div>
        </section>
        <section class="auth-card">
            <div class="section-header">
                <div>
                    <h2>Resend verification email</h2>
                    <p class="section-subtitle">Provide the same username and email used at registration.</p>
                </div>
            </div>
            <form class="stack" th:action="@{/auth/resend-verification}" method="post">
                <th:block th:replace="~{fragments/layout :: csrf}"></th:block>
                <div class="field">
                    <label for="username">Username</label>
                    <input id="username" name="username" type="text" required>
                </div>
                <div class="field">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" required>
                </div>
                <button class="button button--primary" type="submit">Resend verification link</button>
            </form>
        </section>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</div>
<th:block th:replace="~{fragments/layout :: scripts('/js/auth.js')}"></th:block>
</body>
</html>
