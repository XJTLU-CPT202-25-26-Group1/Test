<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: appLayout(
        'Resend Verification',
        ~{::content},
        ~{::pageStyles},
        ~{::pageScripts}
      )}">
<body>
<th:block th:fragment="pageStyles">
    <link rel="stylesheet" th:href="@{/css/auth.css(v='20260424')}">
</th:block>

<th:block th:fragment="content">
    <section class="auth-shell auth-shell--simple">
        <article class="card auth-card auth-card--compact">
            <h1>Resend Verification</h1>
            <p class="auth-card__subtitle">Enter your username and email to receive a new verification link.</p>

            <form th:action="@{/auth/resend-verification}" method="post" class="form-grid">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-group">
                    <label for="username">Username</label>
                    <input id="username" name="username" type="text" autocomplete="username" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" autocomplete="email" required>
                </div>

                <div class="form-actions auth-actions">
                    <button type="submit" class="btn btn-primary">Send Verification Email</button>
                </div>
            </form>

            <div class="auth-links auth-links--stack">
                <a th:href="@{/auth/login}">Back to login</a>
                <a th:href="@{/auth/forgot-password}">Forgot password?</a>
            </div>
        </article>
    </section>
</th:block>

<th:block th:fragment="pageScripts">
    <script th:src="@{/js/auth.js}"></script>
</th:block>
</body>
</html>
