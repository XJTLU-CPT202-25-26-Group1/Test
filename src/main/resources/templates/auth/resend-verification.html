<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Resend Verification')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<div th:replace="~{fragments/layout :: alerts}"></div>
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h4 mb-3">Resend Verification Email</h1>
                    <p class="text-muted">If your account has not been verified yet, enter the username and registered email to receive a fresh verification link.</p>
                    <form class="row g-3" th:action="@{/auth/resend-verification}" method="post">
                        <div class="col-12">
                            <label class="form-label">Username</label>
                            <input class="form-control" type="text" name="username" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Registered Email</label>
                            <input class="form-control" type="email" name="email" required>
                        </div>
                        <div class="col-12 d-flex gap-2">
                            <button class="btn btn-primary" type="submit">Send Verification Email</button>
                            <a class="btn btn-outline-secondary" th:href="@{/auth/login}">Back to Login</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
