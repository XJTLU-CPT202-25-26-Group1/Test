<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('重置密码')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<div th:replace="~{fragments/layout :: alerts}"></div>

<main class="site-main">
  <div class="page-wrap">
    <section class="auth-shell">
      <div class="auth-panel">
        <div class="page-kicker">密码重置</div>
        <h1>设置新的登录密码。</h1>
        <p>使用邮件中的用户名和重置令牌，设置不少于 6 位的新密码。</p>
      </div>

      <div class="auth-card">
        <div class="page-kicker">更新密码</div>
        <h1>完成密码重置</h1>
        <p>填写下方表单后即可重新登录。</p>

        <form th:action="@{/auth/reset-password}" method="post">
          <div>
            <label class="form-label">用户名</label>
            <input class="form-control" type="text" name="username" th:value="${username}" required>
          </div>
          <div>
            <label class="form-label">重置令牌</label>
            <input class="form-control" type="text" name="token" th:value="${token}" required>
          </div>
          <div>
            <label class="form-label">新密码</label>
            <input class="form-control" type="password" name="newPassword" minlength="6" required>
          </div>
          <div class="form-actions">
            <button class="btn btn-primary" type="submit">更新密码</button>
            <a class="btn btn-outline-secondary" th:href="@{/auth/login}">返回登录</a>
          </div>
        </form>
      </div>
    </section>
  </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
