<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Reset Password')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<div th:replace="~{fragments/layout :: alerts}"></div>

<main class="site-main">
  <div class="page-wrap">
    <section class="auth-shell">
      <div class="auth-panel">
        <div class="page-kicker">Password reset</div>
        <h1>Set a new password for your account.</h1>
        <p>Use the username and reset token from the email message, then enter a new password with at least six characters.</p>
      </div>

      <div class="auth-card">
        <div class="page-kicker">Update password</div>
        <h1>Reset password</h1>
        <p>Complete the form below to finish the password reset process.</p>

        <form th:action="@{/auth/reset-password}" method="post">
          <div>
            <label class="form-label">Username</label>
            <input class="form-control" type="text" name="username" th:value="${username}" required>
          </div>
          <div>
            <label class="form-label">Reset Token</label>
            <input class="form-control" type="text" name="token" th:value="${token}" required>
          </div>
          <div>
            <label class="form-label">New Password</label>
            <input class="form-control" type="password" name="newPassword" minlength="6" required>
          </div>
          <div class="form-actions">
            <button class="btn btn-primary" type="submit">Update Password</button>
            <a class="btn btn-outline-secondary" th:href="@{/auth/login}">Back to Login</a>
          </div>
        </form>
      </div>
    </section>
  </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
