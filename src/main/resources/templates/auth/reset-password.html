<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: appLayout(
        'Reset Password',
        ~{::content},
        ~{::pageStyles},
        ~{::pageScripts}
      )}">
<body>
<th:block th:fragment="pageStyles">
    <link rel="stylesheet" th:href="@{/css/auth.css(v='20260423')}">
</th:block>

<th:block th:fragment="content">
    <section class="auth-shell auth-shell--simple">
        <article class="card auth-card auth-card--compact">
            <h1>Reset Password</h1>
            <p class="auth-card__subtitle">Use the reset token from your email and choose a new password.</p>

            <form th:action="@{/auth/reset-password}" method="post" class="form-grid">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-group">
                    <label for="username">Username</label>
                    <input id="username" name="username" type="text" autocomplete="username"
                           th:value="${username}" required>
                </div>

                <div class="form-group">
                    <label for="token">Reset Token</label>
                    <input id="token" name="token" type="text" th:value="${token}" required>
                </div>

                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input id="newPassword" name="newPassword" type="password"
                           autocomplete="new-password" minlength="6" required>
                </div>

                <div class="form-actions auth-actions">
                    <button type="submit" class="btn btn-primary">Reset Password</button>
                </div>
            </form>

            <div class="auth-links auth-links--stack">
                <a th:href="@{/auth/login}">Back to login</a>
                <a th:href="@{/auth/forgot-password}">Request a new reset token</a>
            </div>
        </article>
    </section>
</th:block>

<th:block th:fragment="pageScripts">
    <script th:src="@{/js/auth.js}"></script>
</th:block>
</body>
</html>
