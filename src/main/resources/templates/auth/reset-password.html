<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Reset Password', '/css/auth.css')}"></head>
<body>
<div class="page-shell">
    <header th:replace="~{fragments/layout :: topbar}"></header>
    <section th:replace="~{fragments/layout :: flash}"></section>

    <main class="auth-shell">
        <section class="hero-card auth-hero">
            <div>
                <div class="eyebrow">Secure reset</div>
                <h1>Set a new password with the token delivered to your inbox.</h1>
                <p>The token is case-insensitive, but the username must match the account receiving the reset email.</p>
            </div>
        </section>
        <section class="auth-card">
            <div class="section-header">
                <div>
                    <h2>Reset password</h2>
                    <p class="section-subtitle">Passwords must be at least 6 characters long.</p>
                </div>
            </div>
            <form class="stack" th:action="@{/auth/reset-password}" method="post">
                <th:block th:replace="~{fragments/layout :: csrf}"></th:block>
                <div class="field">
                    <label for="username">Username</label>
                    <input id="username" name="username" type="text" th:value="${username}" required>
                </div>
                <div class="field">
                    <label for="token">Reset token</label>
                    <input id="token" name="token" type="text" th:value="${token}" required>
                </div>
                <div class="field">
                    <label for="newPassword">New password</label>
                    <input id="newPassword" name="newPassword" type="password" minlength="6" required>
                </div>
                <button class="button button--primary" type="submit">Update password</button>
            </form>
        </section>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</div>
<th:block th:replace="~{fragments/layout :: scripts('/js/auth.js')}"></th:block>
</body>
</html>
