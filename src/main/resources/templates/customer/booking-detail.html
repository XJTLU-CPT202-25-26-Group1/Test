<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('预约详情')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<main class="container py-5">
  <div class="page-wrap">
    <section class="page-intro">
      <div class="page-kicker">预约详情</div>
      <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap">
        <div>
          <h1 class="page-title">查看预约信息</h1>
          <p class="page-summary">确认专家、时间、费用、状态以及反馈提交情况。</p>
        </div>
        <a class="btn btn-outline-secondary" th:href="@{/customer/bookings}">返回预约列表</a>
      </div>
    </section>

    <section class="split-layout">
      <div class="summary-panel">
        <div class="record-head">
          <div>
            <h2 class="record-title" th:text="${booking.topic}">Topic</h2>
            <div class="record-meta">
              <span><strong>专家：</strong><span th:text="${booking.specialist.name}">Specialist</span></span>
              <span><strong>分类：</strong><span th:text="${booking.specialist.category.name}">Category</span></span>
            </div>
          </div>
          <span class="status-tag" th:text="${booking.status}">PENDING</span>
        </div>
        <div class="detail-grid">
          <div class="detail-item">
            <span class="detail-label">日期</span>
            <span class="detail-value" th:text="${booking.slot.slotDate}">Date</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">时间</span>
            <span class="detail-value"><span th:text="${booking.slot.startTime}">Start</span> - <span th:text="${booking.slot.endTime}">End</span></span>
          </div>
          <div class="detail-item">
            <span class="detail-label">费用</span>
            <span class="detail-value" th:text="${booking.calculatedFee}">0</span>
          </div>
          <div class="detail-item" th:if="${booking.rejectionReason != null and !booking.rejectionReason.isBlank()}">
            <span class="detail-label">拒绝原因</span>
            <span class="detail-value" th:text="${booking.rejectionReason}">reason</span>
          </div>
        </div>
        <div class="mt-3">
          <h2 class="section-title mb-2">客户备注</h2>
          <p class="record-description mb-0" th:text="${booking.notes}">Notes</p>
        </div>
      </div>

      <div class="section-panel">
        <div class="section-heading">
          <div>
            <h2>咨询反馈</h2>
            <p class="section-note">预约完成后可在此提交评分和评价。</p>
          </div>
        </div>
        <div class="empty-state" th:if="${booking.status.name() != 'COMPLETED'}">
          只有在预约完成后才能提交反馈。
        </div>
        <div th:if="${existingFeedback != null}" class="record-card">
          <div class="record-meta mb-2">
            <span><strong>评分：</strong><span th:text="${existingFeedback.rating}"></span> / 5</span>
          </div>
          <p class="record-description mb-0"><strong>评价：</strong><span th:text="${existingFeedback.comment}"></span></p>
        </div>
        <form th:if="${booking.status.name() == 'COMPLETED' and existingFeedback == null}" th:action="@{/customer/bookings/feedback}" method="post" class="row g-3">
          <input type="hidden" name="bookingId" th:value="${booking.id}">
          <div class="col-12">
            <label class="form-label">评分</label>
            <select class="form-select" name="rating" required>
              <option value="">请选择评分</option>
              <option value="5">5 - 非常满意</option>
              <option value="4">4 - 满意</option>
              <option value="3">3 - 一般</option>
              <option value="2">2 - 不满意</option>
              <option value="1">1 - 非常不满意</option>
            </select>
          </div>
          <div class="col-12">
            <label class="form-label">评价内容</label>
            <textarea class="form-control" name="comment" rows="4" placeholder="分享你的咨询体验" required></textarea>
          </div>
          <div class="col-12">
            <button class="btn btn-success" type="submit">提交反馈</button>
          </div>
        </form>
      </div>
    </section>
  </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
