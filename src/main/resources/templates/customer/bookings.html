<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('我的预约')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<div th:replace="~{fragments/layout :: alerts}"></div>
<main class="container py-5">
    <h1 class="h3 mb-4">My Bookings</h1>
    <div class="card mb-3" th:each="booking : ${bookings}">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                <div>
                    <h2 class="h5" th:text="${booking.topic}">Topic</h2>
                    <p class="mb-1"><strong>Specialist:</strong> <span th:text="${booking.specialist.name}">Specialist</span></p>
                    <p class="mb-1"><strong>Slot:</strong> <span th:text="${booking.slot.slotDate}"></span> <span th:text="${booking.slot.startTime}"></span> - <span th:text="${booking.slot.endTime}"></span></p>
                    <p class="mb-1"><strong>Status:</strong> <span th:text="${booking.status}">PENDING</span></p>
                    <p class="mb-1"><strong>Fee:</strong> <span th:text="${booking.calculatedFee}">0</span></p>
                    <p class="mb-0" th:if="${booking.rejectionReason != null and !booking.rejectionReason.isBlank()}"><strong>Reason:</strong> <span th:text="${booking.rejectionReason}"></span></p>
                </div>
                <div class="d-flex gap-2 flex-wrap">
                    <form th:if="${booking.status.name() == 'PENDING' or booking.status.name() == 'CONFIRMED'}" th:action="@{/customer/bookings/cancel}" method="post">
                        <input type="hidden" name="id" th:value="${booking.id}">
                        <button class="btn btn-outline-danger btn-sm" type="submit">Cancel</button>
                    </form>
                    <form th:if="${booking.status.name() == 'CONFIRMED'}" th:action="@{/customer/bookings/reschedule}" method="post" class="d-flex gap-2">
                        <input type="hidden" name="id" th:value="${booking.id}">
                        <input class="form-control form-control-sm" type="number" min="1" name="newSlotId" placeholder="New slot ID" required>
                        <button class="btn btn-outline-primary btn-sm" type="submit">Reschedule</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
