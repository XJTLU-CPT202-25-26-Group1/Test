<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: appLayout(
        'Create Booking',
        ~{::content},
        ~{::pageStyles},
        ~{::pageScripts}
      )}">
<body>
<th:block th:fragment="pageStyles">
    <link rel="stylesheet" th:href="@{/css/customer.css(v='20260423')}">
</th:block>

<th:block th:fragment="content">
    <section class="customer-page">
        <div class="page-header customer-page__header">
            <div>
                <span class="section-kicker">Booking Request</span>
                <h1 class="page-title">Create Booking</h1>
                <p class="page-subtitle">Confirm the selected specialist and slot, then describe your consultation request.</p>
            </div>
            <a class="btn btn-secondary"
               th:href="@{/customer/specialists/detail(id=${specialist.id})}">
                Back to Specialist
            </a>
        </div>

        <section class="booking-create-grid">
            <article class="card booking-summary-card">
                <h2>Selected Appointment</h2>
                <div class="booking-summary-list">
                    <div>
                        <span>Specialist</span>
                        <strong th:text="${specialist.name}">Specialist Name</strong>
                    </div>
                    <div>
                        <span>Category</span>
                        <strong th:text="${specialist.category != null ? specialist.category.name : 'Uncategorized'}">Category</strong>
                    </div>
                    <div>
                        <span>Date</span>
                        <strong th:text="${#temporals.format(slot.slotDate, 'yyyy-MM-dd')}">2026-04-23</strong>
                    </div>
                    <div>
                        <span>Time</span>
                        <strong>
                            <span th:text="${#temporals.format(slot.startTime, 'HH:mm')}">09:00</span>
                            <span> - </span>
                            <span th:text="${#temporals.format(slot.endTime, 'HH:mm')}">10:00</span>
                        </strong>
                    </div>
                    <div>
                        <span>Estimated Fee</span>
                        <strong th:text="${#numbers.formatDecimal(specialist.feeRate, 1, 2)}">200.00</strong>
                    </div>
                </div>
            </article>

            <article class="card booking-form-card">
                <h2>Request Details</h2>
                <form th:action="@{/customer/bookings/create}" method="post" class="form-grid">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="specialistId" th:value="${specialist.id}">
                    <input type="hidden" name="slotId" th:value="${slot.id}">

                    <div class="form-group">
                        <label for="topic">Consultation Topic</label>
                        <input id="topic" name="topic" type="text"
                               placeholder="Briefly describe the consultation topic" required>
                    </div>

                    <div class="form-group">
                        <label for="notes">Notes</label>
                        <textarea id="notes" name="notes"
                                  placeholder="Add context, expectations, or questions for the specialist."></textarea>
                    </div>

                    <div class="form-actions booking-form-actions">
                        <button type="submit" class="btn btn-primary">Submit Booking Request</button>
                        <a class="btn btn-secondary"
                           th:href="@{/customer/specialists/detail(id=${specialist.id})}">
                            Cancel
                        </a>
                    </div>
                </form>
            </article>
        </section>
    </section>
</th:block>

<th:block th:fragment="pageScripts"></th:block>
</body>
</html>
