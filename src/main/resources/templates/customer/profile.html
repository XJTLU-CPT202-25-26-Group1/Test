<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: appLayout(
        'Customer Profile',
        ~{::content},
        ~{::pageStyles},
        ~{::pageScripts}
      )}">
<body>
<th:block th:fragment="pageStyles">
    <link rel="stylesheet" th:href="@{/css/customer.css(v='20260425')}">
</th:block>

<th:block th:fragment="content">
    <section class="customer-page">
        <div class="page-header customer-page__header">
            <div>
                <span class="section-kicker">Personal Information</span>
                <h1 class="page-title">Customer Profile</h1>
                <p class="page-subtitle">Keep your contact information up to date for booking communication.</p>
            </div>
            <a class="btn btn-secondary" th:href="@{/customer/dashboard}">Back to Dashboard</a>
        </div>

        <section class="profile-grid">
            <article class="card profile-summary-card">
                <div class="profile-avatar" th:text="${#strings.substring(profile.displayName, 0, 1)}">C</div>
                <h2 th:text="${profile.displayName}">Customer Name</h2>
                <p th:text="${profile.email}">customer@example.com</p>

                <div class="profile-readonly-list">
                    <div>
                        <span>Username</span>
                        <strong th:text="${profile.username}">username</strong>
                    </div>
                    <div>
                        <span>Role</span>
                        <strong th:text="${profile.role}">CUSTOMER</strong>
                    </div>
                    <div>
                        <span>Gender</span>
                        <strong th:text="${profile.gender}">UNSPECIFIED</strong>
                    </div>
                    <div>
                        <span>Email Verification</span>
                        <strong th:text="${profile.emailVerified ? 'Verified' : 'Not verified'}">Verified</strong>
                    </div>
                </div>
            </article>

            <article class="card profile-form-card">
                <h2>Edit Profile</h2>
                <form th:action="@{/customer/profile}" method="post" class="form-grid">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div class="form-group">
                        <label for="displayName">Display Name</label>
                        <input id="displayName" name="displayName" type="text"
                               th:value="${profile.displayName}" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input id="email" name="email" type="email"
                               th:value="${profile.email}" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone</label>
                        <input id="phone" name="phone" type="text"
                               th:value="${profile.phone}" required>
                    </div>

                    <div class="form-actions booking-form-actions">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <a class="btn btn-secondary" th:href="@{/customer/dashboard}">Cancel</a>
                    </div>
                </form>
            </article>
        </section>
    </section>
</th:block>

<th:block th:fragment="pageScripts"></th:block>
</body>
</html>
