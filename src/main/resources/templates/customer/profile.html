<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('个人资料')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<div th:replace="~{fragments/layout :: alerts}"></div>
<main class="container py-5">
  <div class="page-wrap">
    <section class="page-intro">
      <div class="page-kicker">个人资料</div>
      <h1 class="page-title">客户资料维护</h1>
      <p class="page-summary">更新昵称、邮箱和联系电话，后端保存逻辑保持不变。</p>
    </section>

    <section class="auth-card">
      <form class="row g-3" th:action="@{/customer/profile}" method="post">
        <div class="col-md-6">
          <label class="form-label">显示名称</label>
          <input class="form-control" type="text" name="displayName" th:value="${profile.displayName}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">邮箱</label>
          <input class="form-control" type="email" name="email" th:value="${profile.email}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">联系电话</label>
          <input class="form-control" type="text" name="phone" th:value="${profile.phone}" required>
        </div>
        <div class="col-12 form-actions">
          <button class="btn btn-primary" type="submit">保存资料</button>
          <a class="btn btn-outline-secondary" th:href="@{/customer/dashboard}">返回工作台</a>
        </div>
      </form>
    </section>
  </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
