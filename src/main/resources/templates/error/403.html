<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('403')}"></head>
<body>
  <header th:replace="~{fragments/layout :: header}"></header>
  <main class="site-main">
    <div class="error-shell">
      <div class="page-kicker">Access control</div>
      <div class="error-code">403</div>
      <h1 class="page-title">You do not have permission to open this page.</h1>
      <p class="page-summary">Please return to the previous page or go back to the home page and sign in with an account that has the required permissions.</p>
      <div class="form-actions justify-content-center mt-4">
        <a class="btn btn-primary" href="/">Go to Home</a>
        <a class="btn btn-outline-secondary" href="/auth/login">Log In</a>
      </div>
    </div>
  </main>
  <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
