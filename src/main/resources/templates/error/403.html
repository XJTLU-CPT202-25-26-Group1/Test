<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Access Denied', null)}"></head>
<body>
<div class="page-shell">
    <header th:replace="~{fragments/layout :: topbar}"></header>
    <main class="page-content--centered stack">
        <section class="hero-card">
            <div class="eyebrow">403 error</div>
            <h1>You do not have permission to access this page.</h1>
            <p>The current account role cannot open the requested resource. Return to your dashboard or sign in with a different role.</p>
            <div class="hero-actions">
                <a class="button button--primary" th:href="@{${dashboardPath}}">Go to dashboard</a>
                <a class="button button--ghost" th:href="@{/}">Back to home</a>
            </div>
        </section>
    </main>
    <footer th:replace="~{fragments/layout :: footer}"></footer>
</div>
<th:block th:replace="~{fragments/layout :: scripts(null)}"></th:block>
</body>
</html>
