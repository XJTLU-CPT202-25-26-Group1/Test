<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Page Not Found', null)}"></head>
<body>
<div class="page-shell">
    <header th:replace="~{fragments/layout :: topbar}"></header>
    <main class="page-content--centered stack">
        <section class="hero-card">
            <div class="eyebrow">404 error</div>
            <h1>The page you requested could not be found.</h1>
            <p>The route may have moved, or the link may no longer be valid. Use the navigation above to continue working in the system.</p>
            <div class="hero-actions">
                <a class="button button--primary" th:href="@{${dashboardPath}}">Go to dashboard</a>
                <a class="button button--ghost" th:href="@{/}">Back to home</a>
            </div>
        </section>
    </main>
    <footer th:replace="~{fragments/layout :: footer}"></footer>
</div>
<th:block th:replace="~{fragments/layout :: scripts(null)}"></th:block>
</body>
</html>
