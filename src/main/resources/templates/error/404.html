<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('404')}"></head>
<body>
  <header th:replace="~{fragments/layout :: header}"></header>
  <main class="site-main">
    <div class="error-shell">
      <div class="page-kicker">Page not found</div>
      <div class="error-code">404</div>
      <h1 class="page-title">The page you requested could not be found.</h1>
      <p class="page-summary">The address may be outdated, the page may have moved, or the request may no longer be valid. Use the links below to continue.</p>
      <div class="form-actions justify-content-center mt-4">
        <a class="btn btn-primary" href="/">Go to Home</a>
        <a class="btn btn-outline-secondary" href="/auth/login">Log In</a>
      </div>
    </div>
  </main>
  <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
