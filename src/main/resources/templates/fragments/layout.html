<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${title} + ' | 专家咨询预约系统'">专家咨询预约系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link th:href="@{/css/main.css}" rel="stylesheet">
  <th:block th:if="${pageCss != null}">
    <link th:href="@{${pageCss}}" rel="stylesheet">
  </th:block>
</head>

<body>
<header th:fragment="header">
  <nav class="navbar navbar-expand-lg navbar-dark app-navbar">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" th:href="@{/}">
        <span class="brand-mark"><i class="bi bi-calendar-check fs-5"></i></span>
        <span>专家咨询预约系统</span>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-between" id="navbarNav">
        <ul class="navbar-nav app-nav-list">
          <li class="nav-item" th:if="${!isAuthenticated}">
            <a class="nav-link" th:href="@{/}">首页</a>
          </li>
          <li class="nav-item" th:if="${!isAuthenticated}">
            <a class="nav-link" th:href="@{/auth/register}">注册</a>
          </li>
          <li class="nav-item" th:if="${isAuthenticated}">
            <a class="nav-link" th:href="${dashboardPath}">Dashboard</a>
          </li>
          <li class="nav-item" th:if="${isCustomer}">
            <a class="nav-link" th:href="@{/customer/specialists}">专家浏览</a>
          </li>
          <li class="nav-item" th:if="${isCustomer}">
            <a class="nav-link" th:href="@{/customer/bookings}">我的预约</a>
          </li>
          <li class="nav-item" th:if="${isSpecialist}">
            <a class="nav-link" th:href="@{/specialist/availability}">时间管理</a>
          </li>
          <li class="nav-item" th:if="${isSpecialist}">
            <a class="nav-link" th:href="@{/specialist/bookings}">预约日程</a>
          </li>
          <li class="nav-item" th:if="${isAdmin}">
            <a class="nav-link" th:href="@{/admin/bookings}">预约审核</a>
          </li>
          <li class="nav-item" th:if="${isAdmin}">
            <a class="nav-link" th:href="@{/admin/specialists}">专家管理</a>
          </li>
        </ul>

        <div class="d-flex align-items-center gap-2 ms-lg-3">
          <a class="btn btn-light btn-sm px-3" th:if="${!isAuthenticated}" th:href="@{/auth/login}">
            登录
          </a>

          <div class="dropdown" th:if="${isAuthenticated}">
            <button class="btn account-trigger dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
              <span class="account-avatar"><i class="bi bi-person-circle"></i></span>
              <span class="text-start">
                <span class="account-name" th:text="${currentDisplayName}">Account</span>
                <span class="account-role" th:text="${currentRoleLabel}">Role</span>
              </span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end account-menu shadow-lg border-0">
              <li class="dropdown-header">
                <strong th:text="${currentDisplayName}">Account</strong>
                <div class="small text-muted" th:text="${currentUsername}">username</div>
              </li>
              <li>
                <a class="dropdown-item" th:href="${dashboardPath}">
                  <i class="bi bi-speedometer2 me-2"></i>Dashboard
                </a>
              </li>
              <li>
                <a class="dropdown-item" th:href="${profilePath}">
                  <i class="bi bi-person-lines-fill me-2"></i>账户资料
                </a>
              </li>
              <li>
                <a class="dropdown-item" th:href="@{/auth/login}">
                  <i class="bi bi-arrow-repeat me-2"></i>切换账户
                </a>
              </li>
              <li><hr class="dropdown-divider"></li>
              <li>
                <form th:action="@{/logout}" method="post" class="px-2">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button class="dropdown-item text-danger" type="submit">
                    <i class="bi bi-box-arrow-right me-2"></i>退出登录
                  </button>
                </form>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </nav>
</header>

<div th:fragment="alerts">
  <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show m-3" role="alert">
    <strong>登录失败</strong>
    <span>用户名或密码错误，请重新尝试。</span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div th:if="${param.logout}" class="alert alert-success alert-dismissible fade show m-3" role="alert">
    <strong>已安全退出</strong>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div th:if="${message}" class="alert alert-info alert-dismissible fade show m-3" role="alert">
    <span th:text="${message}">提示信息</span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
</div>

<footer th:fragment="footer" class="py-4 mt-auto border-top">
  <div class="container text-center text-muted">
    <p class="mb-0">&copy; 2024 XJTLU 软件工程课程项目 | 专家咨询预约系统</p>
    <p class="mb-0 small">CPT202 Group Project - Option B</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script th:src="@{/js/common.js}"></script>
<th:block th:if="${pageJs != null}">
  <script th:src="@{${pageJs}}"></script>
</th:block>
</body>
</html>
