<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${title} + ' | 专家咨询预约系统'">专家咨询预约系统</title>
  
  <!-- Bootstrap 5.3 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  
  <!-- 自定义样式 -->
  <link th:href="@{/css/main.css}" rel="stylesheet">
  
  <!-- 页面专属CSS（可选） -->
  <th:block th:if="${pageCss != null}">
    <link th:href="@{${pageCss}}" rel="stylesheet">
  </th:block>
</head>

<body>
  <!-- 通用头部 -->
  <header th:fragment="header">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="/">
          <i class="bi bi-calendar-check fs-4 me-2"></i>
          <span>专家咨询预约系统</span>
        </a>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <!-- 已认证用户 -->
            <li class="nav-item">
              <a class="nav-link text-white" th:href="@{/auth/login}">
                <i class="bi bi-box-arrow-in-right"></i> 登录 / 切换账号
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <!-- 全局消息提示 -->
  <div th:fragment="alerts">
    <!-- Spring Security错误 -->
    <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show m-3" role="alert">
      <strong>⚠️ 登录失败！</strong> 
      <span>用户名或密码错误</span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    
    <!-- 退出成功 -->
    <div th:if="${param.logout}" class="alert alert-success alert-dismissible fade show m-3" role="alert">
      <strong>✓ 您已安全退出</strong>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    
    <!-- 通用消息（通过Model.addAttribute("message", "...")传递） -->
    <div th:if="${message}" class="alert alert-info alert-dismissible fade show m-3" role="alert">
      <span th:text="${message}">提示信息</span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
  </div>

  <!-- 页脚 -->
  <footer th:fragment="footer" class="bg-light py-4 mt-auto border-top">
    <div class="container text-center text-muted">
      <p class="mb-0">&copy; 2024 XJTLU 软件工程课程项目 | 专家咨询预约系统</p>
      <p class="mb-0 small">CPT202 Group Project - Option B</p>
    </div>
  </footer>

  <!-- JS 依赖 -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  
  <!-- 全局JS -->
  <script th:src="@{/js/common.js}"></script>
  
  <!-- 页面专属JS -->
  <th:block th:if="${pageJs != null}">
    <script th:src="@{${pageJs}}"></script>
  </th:block>
</body>
</html>
