<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Availability Management')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<div th:replace="~{fragments/layout :: alerts}"></div>
<main class="container py-5">
    <h1 class="h3 mb-4">Availability for <span th:text="${specialist.name}">Specialist</span></h1>
    <form class="row g-2 mb-4" th:action="@{/specialist/availability}" method="post">
        <div class="col-md-3"><input class="form-control" type="date" name="date" required></div>
        <div class="col-md-2"><input class="form-control" type="time" name="startTime" required></div>
        <div class="col-md-2"><input class="form-control" type="time" name="endTime" required></div>
        <div class="col-auto"><button class="btn btn-primary" type="submit">Add slot</button></div>
    </form>
    <div class="table-responsive">
        <table class="table table-striped">
            <thead><tr><th>Date</th><th>Start</th><th>End</th><th>Status</th><th>Slot ID</th><th>Actions</th></tr></thead>
            <tbody>
            <tr th:each="slot : ${slots}">
                <td th:text="${slot.slotDate}">2026-01-01</td>
                <td th:text="${slot.startTime}">10:00</td>
                <td th:text="${slot.endTime}">11:00</td>
                <td th:text="${slot.booked ? 'Booked' : 'Available'}">Available</td>
                <td th:text="${slot.id}">1</td>
                <td>
                    <div th:if="${!slot.booked}" class="d-flex flex-column gap-2">
                        <form th:action="@{/specialist/availability/update}" method="post" class="row g-2">
                            <input type="hidden" name="slotId" th:value="${slot.id}">
                            <div class="col-12"><input class="form-control form-control-sm" type="date" name="date" th:value="${slot.slotDate}" required></div>
                            <div class="col-6"><input class="form-control form-control-sm" type="time" name="startTime" th:value="${slot.startTime}" required></div>
                            <div class="col-6"><input class="form-control form-control-sm" type="time" name="endTime" th:value="${slot.endTime}" required></div>
                            <div class="col-12"><button class="btn btn-outline-primary btn-sm w-100" type="submit">Update</button></div>
                        </form>
                        <form th:action="@{/specialist/availability/delete}" method="post">
                            <input type="hidden" name="slotId" th:value="${slot.id}">
                            <button class="btn btn-outline-danger btn-sm w-100" type="submit">Delete</button>
                        </form>
                    </div>
                    <span th:if="${slot.booked}" class="text-muted small">Booked slots are locked.</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
