<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Consultation Feedback')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<main class="container py-5">
    <div class="page-wrap">
        <section class="page-intro">
            <div class="page-kicker">Specialist portal</div>
            <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap">
                <div>
                    <h1 class="page-title">Consultation Feedback</h1>
                    <p class="page-summary">Review ratings and comments submitted after completed consultations.</p>
                </div>
                <a class="btn btn-outline-secondary" th:href="@{/specialist/bookings}">Back to Schedule</a>
            </div>
        </section>
        <div class="empty-state" th:if="${#lists.isEmpty(feedbackList)}">No feedback has been submitted yet.</div>
        <div class="record-card" th:each="feedback : ${feedbackList}">
            <div class="record-head">
                <div>
                    <h2 class="record-title" th:text="${feedback.customerName}">Customer</h2>
                    <div class="record-meta">
                        <span><strong>Booking Topic:</strong> <span th:text="${feedback.booking.topic}">Topic</span></span>
                        <span><strong>Submitted:</strong> <span th:text="${#temporals.format(feedback.createdAt, 'yyyy-MM-dd HH:mm')}">Created At</span></span>
                    </div>
                </div>
                <span class="status-tag success" th:text="${feedback.rating + ' / 5'}">5 / 5</span>
            </div>
            <p class="record-description mb-0" th:text="${feedback.comment}">Comment</p>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
