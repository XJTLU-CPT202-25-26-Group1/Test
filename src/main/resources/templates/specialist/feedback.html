<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Specialist Feedback', '/css/specialist/feedback.css')}"></head>
<body>
<div class="page-shell">
    <header th:replace="~{fragments/layout :: topbar}"></header>
    <section th:replace="~{fragments/layout :: flash}"></section>

    <div class="shell-body">
        <aside th:replace="~{fragments/layout :: sideNav}"></aside>
        <main class="page-content stack">
            <section class="page-header">
                <div>
                    <h1>Customer feedback</h1>
                    <p>Review customer ratings and comments submitted after completed consultations.</p>
                </div>
            </section>

            <section class="cards-grid" th:if="${!#lists.isEmpty(feedbackList)}">
                <article class="list-card" th:each="feedback : ${feedbackList}">
                    <span class="tag rating" th:text="${'Rating: ' + feedback.rating + ' / 5'}">Rating: 5 / 5</span>
                    <h3 th:text="${feedback.customerName}">Demo Customer</h3>
                    <p th:text="${feedback.comment}">Helpful consultation.</p>
                    <div class="summary-strip">
                        <span class="tag" th:text="${'Booking #' + feedback.booking.id}">Booking #1</span>
                        <span class="tag" th:text="${#temporals.format(feedback.createdAt, 'dd MMM yyyy')}">21 Apr 2026</span>
                    </div>
                </article>
            </section>

            <section class="panel empty-state" th:if="${#lists.isEmpty(feedbackList)}">
                Feedback will appear here after customers submit ratings on completed bookings.
            </section>
        </main>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</div>
<th:block th:replace="~{fragments/layout :: scripts('/js/specialist/feedback.js')}"></th:block>
</body>
</html>
