<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('专家资料')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<div th:replace="~{fragments/layout :: alerts}"></div>
<main class="container py-5">
  <div class="page-wrap">
    <section class="page-intro">
      <div class="page-kicker">专家资料</div>
      <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap">
        <div>
          <h1 class="page-title">专家个人资料</h1>
          <p class="page-summary">只读展示当前登录专家的账号信息与专业信息。</p>
        </div>
        <a class="btn btn-outline-secondary" th:href="@{/specialist/dashboard}">返回工作台</a>
      </div>
    </section>

    <section class="split-layout">
      <div class="summary-panel">
        <h2 class="section-title mb-3">账号信息</h2>
        <div class="detail-grid">
          <div class="detail-item">
            <span class="detail-label">用户名</span>
            <span class="detail-value" th:text="${account.username}">username</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">显示名称</span>
            <span class="detail-value" th:text="${account.displayName}">display name</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">邮箱</span>
            <span class="detail-value" th:text="${account.email}">email</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">联系电话</span>
            <span class="detail-value" th:text="${account.phone}">phone</span>
          </div>
        </div>
      </div>
      <div class="section-panel">
        <h2 class="section-title mb-3">专业信息</h2>
        <div class="detail-grid">
          <div class="detail-item">
            <span class="detail-label">姓名</span>
            <span class="detail-value" th:text="${specialist.name}">name</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">分类</span>
            <span class="detail-value" th:text="${specialist.category != null ? specialist.category.name : '未分配'}">category</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">级别</span>
            <span class="detail-value" th:text="${specialist.level}">level</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">状态</span>
            <span class="detail-value" th:text="${specialist.status}">ACTIVE</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">咨询费</span>
            <span class="detail-value"><span th:text="${specialist.feeRate}">0</span> / 小时</span>
          </div>
        </div>
        <div class="mt-3">
          <h3 class="section-title mb-2">专家简介</h3>
          <p class="record-description mb-0" th:text="${specialist.profileDescription}">description</p>
        </div>
      </div>
    </section>
  </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
